<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Streamlined Staffing ATS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{--brand:#00756a;--brand-d:#005c53;--ink:#1a1f36;--mut:#6b7280;--bg:#f4f5f7;--line:#e5e7eb;--blue:#2563eb;--green:#059669;--red:#dc2626;--amber:#d97706;--purple:#7c3aed}
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{margin:0;background:var(--bg);color:var(--ink);font-size:14px}
button{cursor:pointer;font-family:inherit}input,select,textarea{font-family:inherit;font-size:13px}
a{color:var(--blue);text-decoration:none}
.spin{width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}
.topnav{position:sticky;top:0;z-index:40;background:#173330;color:#fff;display:flex;align-items:center;gap:4px;padding:0 16px;height:52px;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.topnav .logo{font-weight:700;font-size:15px;margin-right:14px;white-space:nowrap;color:#fff}
.topnav .logo span{color:#7fd6cc}
.tn-item{background:none;border:none;color:#cbd5d3;padding:0 12px;height:52px;font-size:13px;font-weight:500;border-bottom:3px solid transparent;white-space:nowrap}
.tn-item:hover{color:#fff}.tn-item.on{color:#fff;border-bottom-color:#4fd1c5}
.tn-more{position:relative}
.tn-menu{position:absolute;top:52px;left:0;background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.15);min-width:200px;padding:6px;display:none;z-index:50}
.tn-menu.open{display:block}
.tn-menu button{display:flex;width:100%;text-align:left;background:none;border:none;padding:9px 12px;border-radius:7px;font-size:13px;color:var(--ink);gap:8px}
.tn-menu button:hover{background:#f0f4f3}
.gsearch{margin-left:auto;position:relative}
.gsearch input{background:#0f2422;border:1px solid #2c4a46;color:#fff;border-radius:8px;padding:7px 12px;width:230px;font-size:13px}
.gsearch input::placeholder{color:#7a938f}
.gs-results{position:absolute;top:40px;right:0;width:340px;background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 35px rgba(0,0,0,.18);max-height:420px;overflow:auto;z-index:60}
.wrap{max-width:1280px;margin:0 auto;padding:22px 20px 60px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px}
.pad{padding:16px}
h1.pg{font-size:22px;font-weight:650;margin:0}
.sub{color:var(--mut);font-size:13px}
.btn{display:inline-flex;align-items:center;gap:6px;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:550;border:1px solid transparent}
.btn-p{background:var(--brand);color:#fff}.btn-p:hover{background:var(--brand-d)}
.btn-o{background:#fff;color:var(--ink);border-color:var(--line)}.btn-o:hover{background:#f9fafb}
.btn-d{background:#fff;color:var(--red);border-color:#fecaca}.btn-d:hover{background:#fef2f2}
.btn-s{padding:5px 10px;font-size:12px}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11.5px;font-weight:600;text-transform:capitalize;white-space:nowrap}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#8b93a1;font-weight:650;border-bottom:1px solid var(--line);background:#fafbfc}
.tbl td{padding:10px 12px;border-bottom:1px solid #f1f3f5;vertical-align:middle}
.tbl tr.click:hover{background:#f6f9f8;cursor:pointer}
.inp{width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:8px;background:#fff}
.inp:focus{outline:2px solid #b3e0db;border-color:var(--brand)}
.lbl{display:block;font-size:12px;font-weight:600;color:#4b5563;margin:0 0 4px}
.fld{margin-bottom:12px}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:16px;overflow-x:auto}
.tab{background:none;border:none;padding:10px 14px;font-size:13px;font-weight:550;color:var(--mut);border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--brand);border-bottom-color:var(--brand)}
.avatar{border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:650;flex-shrink:0}
.chip{display:inline-flex;padding:3px 10px;background:#eef2f1;color:#374151;border-radius:99px;font-size:12px;margin:0 4px 4px 0}
.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.stat .v{font-size:24px;font-weight:700;margin-top:2px}
.stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#8b93a1;font-weight:650}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
#modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
#modal-bg.open{display:flex}
#modal{background:#fff;border-radius:14px;width:100%;max-width:560px;box-shadow:0 25px 60px rgba(0,0,0,.3)}
#modal.wide{max-width:820px}
.mhead{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
.mhead h3{margin:0;font-size:16px}
.mbody{padding:20px;max-height:70vh;overflow:auto}
.mfoot{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--line)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#173330;color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;z-index:200;display:none;box-shadow:0 8px 25px rgba(0,0,0,.25)}
.kb{display:flex;gap:12px;overflow-x:auto;padding-bottom:14px;align-items:flex-start}
.kb-col{flex:0 0 250px;background:#eceff1;border-radius:12px;padding:10px}
.kb-col.over{outline:2px dashed var(--brand);outline-offset:-2px}
.kb-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;cursor:grab}
.kb-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.kb-card.drag{opacity:.4}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.cal-hd{background:#fafbfc;padding:8px;font-size:11px;font-weight:700;text-transform:uppercase;color:#8b93a1;text-align:center}
.cal-d{background:#fff;min-height:92px;padding:6px;font-size:12px}
.cal-d.dim{background:#fafbfc;color:#c3c8d0}
.cal-d .n{font-weight:600;font-size:11px;margin-bottom:3px}
.cal-d.today .n{background:var(--brand);color:#fff;border-radius:99px;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center}
.ev{background:#e0f2f0;color:#00756a;border-radius:6px;padding:2px 6px;font-size:11px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stars{color:#f59e0b;cursor:pointer;user-select:none;font-size:15px;letter-spacing:1px}
.check{width:15px;height:15px;cursor:pointer}
.empty{padding:48px 16px;text-align:center;color:#9aa1ad}
.empty .big{font-size:34px;margin-bottom:8px}
.hint{font-size:12px;color:#8b93a1}
.funnel-bar{height:26px;background:linear-gradient(90deg,var(--brand),#4fd1c5);border-radius:6px;color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;padding:0 10px;min-width:36px}
.timeline{position:relative;padding-left:22px}
.timeline:before{content:'';position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl-item{position:relative;padding-bottom:16px}
.tl-item:before{content:'';position:absolute;left:-19px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--brand);border:2px solid #fff;box-shadow:0 0 0 2px var(--line)}
@media(max-width:760px){.gsearch input{width:130px}.wrap{padding:14px 10px 60px}}
.prog{flex:1;height:8px;background:#eef0f2;border-radius:99px;overflow:hidden}
.prog>div{height:100%;border-radius:99px;background:var(--brand)}
</style></head><body>
<div id="app"><div style="padding:80px 0"><div class="spin"></div><div style="text-align:center;margin-top:14px;color:#8b93a1;font-size:13px">Loading Streamlined Staffing ATS…</div></div></div>
<div id="modal-bg"><div id="modal"></div></div>
<div id="toast"></div>
<script>
"use strict";
var API=location.host.indexOf('supabase.co')>-1?location.origin+location.pathname.replace(/\/$/,''):'https://nwknnsbiroppdaraxmxp.supabase.co/functions/v1/ats';
var D={candidates:[],jobs:[],clients:[],contacts:[],applications:[],stages:[],pipelines:[],templates:[],pools:[],poolCands:[],tasks:[],interviews:[],placements:[],automations:[],sequences:[],seqSteps:[],activities:[],recs:[],runs:[],profiles:[]};
var S={page:'dashboard',params:{},cq:'',cs:'all',csrc:'all',cscore:'all',cview:'table',cp:0,sel:{},jq:'',js:'all',iview:'cal',calY:(new Date()).getFullYear(),calM:(new Date()).getMonth(),tq:'',detail:null,detailId:null,loading:false};
var CHARTS=[];
var USERS={'Adam':'52b3491f-1a13-4217-823d-2fa2f101260d','Roe':'24fa2020-632f-4464-ab17-04f0095f435f','Carla':'9c29b41f-4c02-4159-a93c-fc56ce75af4e'};
S.user=localStorage.getItem('ats_user')||'Adam';
function uname(uid){for(var k in USERS)if(USERS[k]==uid)return k;return null}
function isNew(c,days){return c&&c.created_at&&(Date.now()-new Date(c.created_at).getTime())<(days||7)*86400000}
function newBadge(c){if(!isNew(c,7))return null;var hot=isNew(c,2);return h('span',{cls:'badge',style:hot?'background:#dc2626;color:#fff':'background:#fee2e2;color:#b91c1c'},hot?'🆕 NEW':'new this week')}
function api(p,opt){return fetch(API+p,opt).then(function(r){return r.json()})}
function post(p,body){return api(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})}
function ins(table,data){return post('/api/insert',{table:table,data:data})}
function upd(table,id,data){return post('/api/update',{table:table,id:id,data:data})}
function del(table,id){return post('/api/delete',{table:table,id:id})}
function bulk(table,ids,data){return post('/api/bulk',{table:table,ids:ids,data:data})}
function aiCall(prompt,system,max){return post('/api/ai',{prompt:prompt,system:system,max_tokens:max||1500}).then(function(d){return d.text||d.error||'No response'})}
function parseAI(r){try{return JSON.parse(r.replace(/```json/gi,'').replace(/```/g,'').trim())}catch(e){var m=r.match(/[\[{][\s\S]*[\]}]/);if(m){try{return JSON.parse(m[0])}catch(e2){}}return null}}
function logActivity(o){var d={type:o.type||'note',description:o.description||'',candidate_id:o.candidate_id||null,job_id:o.job_id||null,client_id:o.client_id||null,application_id:o.application_id||null,metadata:o.metadata||null,user_id:o.user_id||USERS[S.user]||null};ins('activities',d).then(function(r){if(r.result)D.activities.unshift(r.result)})}
function load(){return api('/api/data').then(function(d){D.candidates=d.candidates||[];D.jobs=d.jobs||[];D.clients=d.clients||[];D.contacts=d.contacts||[];D.applications=d.applications||[];D.stages=d.stages||[];D.pipelines=d.pipelines||[];D.templates=d.templates||[];D.pools=d.pools||[];D.poolCands=d.pool_candidates||[];D.tasks=d.tasks||[];D.interviews=d.interviews||[];D.placements=d.placements||[];D.automations=d.automations||[];D.sequences=d.sequences||[];D.seqSteps=d.sequence_steps||[];D.activities=d.activities||[];D.recs=d.recommendations||[];D.runs=d.runs||[];D.profiles=d.profiles||[];render()}).catch(function(e){document.getElementById('app').innerHTML='<div class="empty"><div class="big">⚠️</div>Could not load data: '+e.message+'<br><br><button class="btn btn-p" onclick="location.reload()">Retry</button></div>'})}
function h(t,a){var e=document.createElement(t);if(a)for(var k in a){if(k.slice(0,2)=='on')e[k]=a[k];else if(k=='style')e.style.cssText=a[k];else if(k=='cls')e.className=a[k];else if(k=='html')e.innerHTML=a[k];else if(k=='checked'||k=='disabled'||k=='draggable'||k=='selected')e[k]=a[k];else if(k=='value')e.value=a[k];else e.setAttribute(k,a[k])}for(var i=2;i<arguments.length;i++){var c=arguments[i];if(c==null)continue;if(Array.isArray(c)){c.forEach(function(x){if(x!=null)e.appendChild(typeof x=='object'?x:document.createTextNode(String(x)))})}else e.appendChild(typeof c=='object'?c:document.createTextNode(String(c)))}return e}
function nav(p,params){S.page=p;S.params=params||{};if(p=='candidate-detail')loadDetail(params.id);render();scrollTo(0,0)}
window.nav=nav;
function loadDetail(id){S.detail=null;S.detailId=id;api('/api/candidate?id='+id).then(function(d){if(S.detailId==id){S.detail=d;render()}})}
var SCOLORS={new:['#dbeafe','#1d4ed8'],contacted:['#fef3c7','#b45309'],screening:['#e0e7ff','#4338ca'],submitted:['#fce7f3','#be185d'],interviewing:['#ede9fe','#6d28d9'],offered:['#ffedd5','#c2410c'],placed:['#d1fae5','#047857'],hired:['#d1fae5','#047857'],rejected:['#fee2e2','#b91c1c'],withdrawn:['#f3f4f6','#4b5563'],on_bench:['#cffafe','#0e7490'],blacklisted:['#1f2937','#f9fafb'],active:['#d1fae5','#047857'],open:['#d1fae5','#047857'],draft:['#f3f4f6','#4b5563'],on_hold:['#fef3c7','#b45309'],closed:['#f3f4f6','#4b5563'],filled:['#dbeafe','#1d4ed8'],prospect:['#dbeafe','#1d4ed8'],churned:['#fee2e2','#b91c1c'],pending:['#fef3c7','#b45309'],in_progress:['#dbeafe','#1d4ed8'],completed:['#d1fae5','#047857'],cancelled:['#f3f4f6','#4b5563'],scheduled:['#dbeafe','#1d4ed8'],confirmed:['#e0e7ff','#4338ca'],no_show:['#fee2e2','#b91c1c'],rescheduled:['#fef3c7','#b45309']};
function badge(s){s=s||'—';var c=SCOLORS[s]||['#f3f4f6','#4b5563'];return h('span',{cls:'badge',style:'background:'+c[0]+';color:'+c[1]},s.replace(/_/g,' '))}
function av(n,sz){sz=sz||30;var e=h('div',{cls:'avatar',style:'width:'+sz+'px;height:'+sz+'px;font-size:'+Math.max(10,sz*.36)+'px'});e.textContent=(n||'?').trim().split(/\s+/).map(function(w){return w[0]||''}).join('').slice(0,2).toUpperCase();return e}
function cname(c){return c?((c.first_name||'')+' '+(c.last_name||'')).trim()||c.email||'Unknown':'Unknown'}
function fdate(d){if(!d)return '—';var t=new Date(d);return t.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}
function ftime(d){var t=new Date(d);return t.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})}
function ago(d){if(!d)return'';var s=(Date.now()-new Date(d).getTime())/1000;if(s<3600)return Math.max(1,Math.round(s/60))+'m ago';if(s<86400)return Math.round(s/3600)+'h ago';if(s<86400*30)return Math.round(s/86400)+'d ago';return fdate(d)}
function money(n){if(n==null||n==='')return '—';return '$'+Number(n).toLocaleString()}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none'},2600)}
window.toast=toast;
function openModal(title,body,actions,wide){var bg=document.getElementById('modal-bg'),m=document.getElementById('modal');m.className=wide?'wide':'';m.innerHTML='';m.appendChild(h('div',{cls:'mhead'},h('h3',{},title),h('button',{cls:'btn btn-o btn-s',onclick:closeModal},'✕')));var b=h('div',{cls:'mbody'});b.appendChild(body);m.appendChild(b);if(actions&&actions.length){var f=h('div',{cls:'mfoot'});actions.forEach(function(a){f.appendChild(a)});m.appendChild(f)}bg.classList.add('open')}
function closeModal(){document.getElementById('modal-bg').classList.remove('open')}
window.closeModal=closeModal;
document.getElementById('modal-bg').onclick=function(e){if(e.target.id=='modal-bg')closeModal()};
function fld(label,input){return h('div',{cls:'fld'},h('label',{cls:'lbl'},label),input)}
function inp(attrs){attrs=attrs||{};attrs.cls='inp '+(attrs.cls||'');return h('input',attrs)}
function sel(opts,val,onchange,attrs){attrs=attrs||{};attrs.cls='inp '+(attrs.cls||'');var s=h('select',attrs);opts.forEach(function(o){var v=Array.isArray(o)?o[0]:o,l=Array.isArray(o)?o[1]:String(o).replace(/_/g,' ');s.appendChild(h('option',{value:v},l))});if(val!=null)s.value=val;if(onchange)s.onchange=onchange;return s}
function ta(attrs){attrs=attrs||{};attrs.cls='inp '+(attrs.cls||'');return h('textarea',attrs)}
function stars(val,onset){var e=h('span',{cls:'stars'});for(var i=1;i<=5;i++){(function(i){e.appendChild(h('span',{style:onset?'cursor:pointer':'',onclick:onset?function(ev){ev.stopPropagation();onset(i)}:null},i<=(val||0)?'★':'☆'))})(i)}return e}
function refocus(id){setTimeout(function(){var n=document.getElementById(id);if(n){n.focus();try{n.setSelectionRange(n.value.length,n.value.length)}catch(e){}}},0)}
function csvExport(rows,name){if(!rows.length)return toast('Nothing to export');var cols=Object.keys(rows[0]);var esc=function(v){v=v==null?'':String(v);return '"'+v.replace(/"/g,'""')+'"'};var csv=cols.map(esc).join(',')+'\n'+rows.map(function(r){return cols.map(function(c){return esc(Array.isArray(r[c])?r[c].join('; '):r[c])}).join(',')}).join('\n');var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=name;a.click();toast('Exported '+rows.length+' rows')}
function jobById(id){return D.jobs.find(function(j){return j.id==id})}
function candById(id){return D.candidates.find(function(c){return c.id==id})}
function clientById(id){return D.clients.find(function(c){return c.id==id})}
function stageById(id){return D.stages.find(function(s){return s.id==id})}
function stageBadge(id){var st=stageById(id);if(!st)return h('span',{cls:'hint'},'—');return h('span',{cls:'badge',style:'background:'+st.color+'22;color:'+st.color},st.name)}
function mergeFields(text,c,j){text=text||'';var map={first_name:c?c.first_name||'':'',last_name:c?c.last_name||'':'',full_name:c?cname(c):'',email:c?c.email||'':'',job_title:j?j.title:(c&&c.current_title||''),company:'Streamlined Staffing',recruiter:'Adam'};return text.replace(/\{\{\s*(\w+)\s*\}\}/g,function(m,k){return map[k]!=null?map[k]:m})}
function chart(canvasId,cfg){requestAnimationFrame(function(){var el=document.getElementById(canvasId);if(!el||typeof Chart=='undefined')return;CHARTS.push(new Chart(el,cfg))})}
/* ============ TOP NAV ============ */
var NAV_MAIN=[['dashboard','Dashboard'],['jobs','Jobs'],['candidates','Candidates'],['pipeline','Pipeline'],['interviews','Interviews'],['clients','Clients'],['reports','Reports']];
var NAV_MORE=[['tasks','✓ Tasks'],['inbox','✉ Email & Templates'],['sequences','⚡ Sequences'],['pools','👥 Talent Pools'],['sourcing','🔍 AI Sourcing'],['ai-search','🤖 AI Search'],['automations','⚙ Automations'],['careers','🌐 Careers Page'],['settings','⚙ Settings']];

  var menu=h('div',{cls:'tn-menu'});

  el.appendChild(us);
  el.appendChild(h('div',{style:'margin-left:8px',title:'Actions are recorded as '+S.user},av(S.user,30)));

function runJobMatch(j){
  toast('🤖 AI matching against '+D.candidates.length+' candidates…');
  var kw=((j.skills||[]).join(' ')+' '+j.title).toLowerCase().split(/[^a-z0-9+#]+/).filter(function(w){return w.length>2});
  var scored=D.candidates.filter(function(c){return c.status!='rejected'&&c.status!='blacklisted'&&c.status!='placed'}).map(function(c){
    var txt=((c.current_title||'')+' '+(c.skills||[]).join(' ')).toLowerCase();var s=0;kw.forEach(function(w){if(txt.indexOf(w)>-1)s++});return {c:c,s:s}});
  scored.sort(function(a,b){return b.s-a.s});
  var top=scored.slice(0,70).map(function(x){return x.c});
  var sample=top.map(function(c){return c.id.slice(0,8)+'|'+cname(c)+'|'+(c.current_title||'')+'|'+[c.city,c.state].filter(Boolean).join(',')+'|'+(c.skills||[]).slice(0,8).join(',')+'|'+(c.experience_years||'?')+'yr'}).join('\n');
  aiCall('JOB: '+j.title+'\nSkills needed: '+(j.skills||[]).join(', ')+'\nRequirements: '+(j.requirements||'').slice(0,600)+'\n\nCANDIDATES (id|name|title|location|skills|exp):\n'+sample+'\n\nPick the TOP 10 best matches. Respond ONLY JSON array: [{"id":"8charid","score":0-100,"reason":"one sentence"}]','Expert recruiting matcher. ONLY valid JSON array.',2000).then(function(r){
    var p=parseAI(r);
    if(!p||!Array.isArray(p))return toast('AI response could not be parsed — try again');
    var rows=[];
    p.forEach(function(m){var cd=top.find(function(c){return c.id.slice(0,8)==m.id});if(!cd)return;
      if(D.recs.some(function(x){return x.job_id==j.id&&x.candidate_id==cd.id})){return}
      rows.push({job_id:j.id,candidate_id:cd.id,score:m.score,reason:m.reason,status:'suggested',ai:true})});
    if(!rows.length){toast('AI matching done — matches already listed');S.params.tab='matches';render();return}
    post('/api/insert-many',{table:'sourcing_recommendations',rows:rows}).then(function(x){(x.result||[]).forEach(function(rr){D.recs.unshift(rr)});S.params.tab='matches';toast(rows.length+' new AI matches found');render()})});
}

function pgSourcing(){
  var el=h('div',{});
  el.appendChild(h('div',{style:'margin-bottom:14px'},h('h1',{cls:'pg'},'AI Sourcing'),h('div',{cls:'sub'},'Claude scans your database and recommends candidates for open jobs')));
  var lastRun=D.runs[0];
  el.appendChild(h('div',{cls:'card pad',style:'margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px'},
    h('div',{},h('b',{},'Sourcing engine'),h('div',{cls:'hint'},lastRun?('Last run '+ago(lastRun.started_at)+' · '+(lastRun.recommendations||0)+' recommendations across '+(lastRun.jobs_processed||0)+' jobs'):'Never run')),
    h('button',{cls:'btn btn-p',onclick:function(){
      var openJobs=D.jobs.filter(function(j){return j.status=='open'});
      if(!openJobs.length)return toast('No open jobs');
      toast('Running AI sourcing for '+openJobs.length+' open jobs — this takes a minute…');
      var runRow;
      ins('sourcing_runs',{status:'running',jobs_processed:0,recommendations:0}).then(function(r){runRow=r.result;
        var done=0,total=0;
        var chain=Promise.resolve();
        openJobs.forEach(function(j){chain=chain.then(function(){return new Promise(function(res){runJobMatchQuiet(j,function(n){done++;total+=n;res()})})})});
        chain.then(function(){if(runRow)upd('sourcing_runs',runRow.id,{status:'completed',finished_at:new Date().toISOString(),jobs_processed:done,recommendations:total}).then(function(){if(runRow){runRow.status='completed';runRow.jobs_processed=done;runRow.recommendations=total}});D.runs.unshift(runRow||{});toast('Sourcing complete: '+total+' new recommendations');render()})})}},'🤖 Run AI Sourcing Now')));
  var byJob={};
  D.recs.filter(function(r){return r.status!='dismissed'}).forEach(function(r){byJob[r.job_id]=byJob[r.job_id]||[];byJob[r.job_id].push(r)});
  var any=false;
  Object.keys(byJob).forEach(function(jid){var j=jobById(jid);if(!j)return;any=true;
    var recs=byJob[jid].sort(function(a,b){return (b.score||0)-(a.score||0)});
    var card=h('div',{cls:'card',style:'margin-bottom:12px'});
    card.appendChild(h('div',{cls:'pad',style:'border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;cursor:pointer',onclick:function(){nav('job-detail',{id:j.id,tab:'matches'})}},
      h('b',{},j.title),h('span',{cls:'hint'},recs.length+' matches →')));
    recs.slice(0,5).forEach(function(r){var c=candById(r.candidate_id);if(!c)return;
      card.appendChild(h('div',{style:'padding:9px 16px;border-bottom:1px solid #f1f3f5;display:flex;justify-content:space-between;gap:8px;align-items:center;cursor:pointer',onclick:function(){nav('candidate-detail',{id:c.id})}},
        h('div',{},h('span',{style:'font-weight:600;font-size:13px'},cname(c)),h('span',{cls:'hint'},' — '+(r.reason||'').slice(0,90))),
        h('span',{cls:'badge',style:(r.score||0)>=70?'background:#d1fae5;color:#047857':'background:#fef3c7;color:#b45309'},(r.score||0)+'%')))});
    el.appendChild(card)});
  if(!any)el.appendChild(h('div',{cls:'card'},h('div',{cls:'empty'},h('div',{cls:'big'},'🔍'),'No recommendations yet — run AI sourcing above')));
  return el;
}
function runJobMatchQuiet(j,cb){
  var kw=((j.skills||[]).join(' ')+' '+j.title).toLowerCase().split(/[^a-z0-9+#]+/).filter(function(w){return w.length>2});
  var scored=D.candidates.filter(function(c){return ['rejected','blacklisted','placed'].indexOf(c.status)<0}).map(function(c){var txt=((c.current_title||'')+' '+(c.skills||[]).join(' ')).toLowerCase();var s=0;kw.forEach(function(w){if(txt.indexOf(w)>-1)s++});return {c:c,s:s}});
  scored.sort(function(a,b){return b.s-a.s});
  var top=scored.slice(0,50).map(function(x){return x.c});
  if(!top.length)return cb(0);
  var sample=top.map(function(c){return c.id.slice(0,8)+'|'+cname(c)+'|'+(c.current_title||'')+'|'+(c.skills||[]).slice(0,6).join(',')+'|'+(c.experience_years||'?')+'yr'}).join('\n');
  aiCall('JOB: '+j.title+' | skills: '+(j.skills||[]).join(',')+'\nCANDIDATES (id|name|title|skills|exp):\n'+sample+'\nTop 5 matches ONLY as JSON: [{"id":"8charid","score":0-100,"reason":"short"}]','Matcher. ONLY JSON.',1200).then(function(r){
    var p=parseAI(r);if(!p||!Array.isArray(p))return cb(0);
    var rows=[];p.forEach(function(m){var cd=top.find(function(c){return c.id.slice(0,8)==m.id});if(!cd)return;
      if(D.recs.some(function(x){return x.job_id==j.id&&x.candidate_id==cd.id}))return;
      rows.push({job_id:j.id,candidate_id:cd.id,score:m.score,reason:m.reason,status:'suggested',ai:true})});
    if(!rows.length)return cb(0);
    post('/api/insert-many',{table:'sourcing_recommendations',rows:rows}).then(function(x){(x.result||[]).forEach(function(rr){D.recs.unshift(rr)});cb(rows.length)})
  }).catch(function(){cb(0)});
}
/* ============ AI SEARCH ============ */
function pgAISearch(){
  var el=h('div',{});
  el.appendChild(h('div',{style:'margin-bottom:14px'},h('h1',{cls:'pg'},'AI Candidate Search'),h('div',{cls:'sub'},'Ask in plain English — Claude searches all '+D.candidates.length.toLocaleString()+' candidates')));

  card.appendChild(h('div',{style:'display:flex;gap:8px'},qi,btn));
  var res=h('div',{id:'ai-results',style:'margin-top:14px'});
  card.appendChild(res);

    card.appendChild(h('button',{cls:'chip',style:'border:none;cursor:pointer;margin-top:10px',onclick:function(){qi.value=s;doSearch()}},s))});
  function doSearch(){
    var q=qi.value.trim();if(!q)return;
    btn.disabled=true;btn.textContent='🤖 Step 1/2: filtering…';res.innerHTML='';
    aiCall('Convert this recruiter search to a JSON filter: "'+q+'"\nRespond ONLY JSON: {"keywords":["words to match in title/skills/resume"],"location":"or null","min_experience":null_or_number,"min_english":null_or_1to10}','Search parser. ONLY JSON.',400).then(function(r){
      var f=parseAI(r)||{keywords:q.split(/\s+/)};
      var kws=(f.keywords||[]).map(function(k){return k.toLowerCase()});
      var pool=D.candidates.filter(function(c){
        if(['blacklisted'].indexOf(c.status)>-1)return false;
        if(f.min_experience&&(c.experience_years||0)<f.min_experience)return false;
        if(f.min_english&&(c.english_rate||0)<f.min_english)return false;
        if(f.location&&([c.city,c.state,c.country].join(' ').toLowerCase().indexOf(String(f.location).toLowerCase())<0))return false;
        if(!kws.length)return true;
        var txt=((c.current_title||'')+' '+(c.skills||[]).join(' ')+' '+(c.pooling||'')).toLowerCase();
        return kws.some(function(k){return txt.indexOf(k)>-1})});
      if(!pool.length)pool=D.candidates.slice(0,60);
      var top=pool.slice(0,60);
      btn.textContent='🤖 Step 2/2: ranking '+pool.length+'…';
      var sample=top.map(function(c){return c.id.slice(0,8)+'|'+cname(c)+'|'+(c.current_title||'')+'|'+[c.city,c.country].filter(Boolean).join(',')+'|'+(c.skills||[]).slice(0,7).join(',')+'|'+(c.experience_years||'?')+'yr|eng:'+(c.english_rate||'?')}).join('\n');
      aiCall('QUERY: '+q+'\nCANDIDATES (id|name|title|location|skills|exp|english):\n'+sample+'\nRank the TOP 12 best. ONLY JSON: [{"id":"8charid","score":0-100,"reason":"one short sentence"}]','Expert matcher. ONLY JSON array.',2000).then(function(r2){
        btn.disabled=false;btn.textContent='🤖 Search';
        var p=parseAI(r2);
        if(!p||!Array.isArray(p)){res.appendChild(h('div',{cls:'card pad',style:'white-space:pre-wrap;font-size:13px'},r2));return}
        res.appendChild(h('div',{cls:'hint',style:'margin-bottom:8px'},'Matched '+pool.length+' candidates, showing AI top picks:'));
        p.forEach(function(m){var c=top.find(function(x){return x.id.slice(0,8)==m.id});if(!c)return;
          res.appendChild(h('div',{style:'display:flex;gap:10px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;background:#fff',onclick:function(){nav('candidate-detail',{id:c.id})}},
            av(cname(c),32),
            h('div',{style:'flex:1;min-width:0'},h('div',{style:'font-weight:650;font-size:13.5px'},cname(c)),h('div',{cls:'hint'},m.reason||c.current_title||'')),
            badge(c.status),
            h('span',{cls:'badge',style:(m.score||0)>=70?'background:#d1fae5;color:#047857':'background:#fef3c7;color:#b45309'},(m.score||0)+'%')))})})})
  }
  el.appendChild(card);
  return el;
}
